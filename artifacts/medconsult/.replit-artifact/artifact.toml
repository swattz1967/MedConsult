kind = "web"
previewPath = "/"
title = "MedConsult"
version = "1.0.0"
id = "artifacts/medconsult"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18868

[services.development]
run = "pnpm --filter @workspace/medconsult run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medconsult", "run", "build" ]
publicDir = "artifacts/medconsult/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18868"
BASE_PATH = "/"
