openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MedConsult API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agencies
    description: Booking agency management
  - name: users
    description: User management
  - name: surgeons
    description: Surgeon management
  - name: procedures
    description: Surgical procedure management
  - name: events
    description: Event management
  - name: customers
    description: Customer management
  - name: appointments
    description: Appointment scheduling
  - name: questionnaires
    description: Questionnaire management
  - name: consultation-records
    description: Consultation record management
  - name: media
    description: File/media management
  - name: dashboard
    description: Dashboard and reporting
  - name: config
    description: Configuration lists
  - name: storage
    description: Object storage operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AGENCIES ---
  /agencies:
    get:
      operationId: listAgencies
      tags: [agencies]
      summary: List all agencies
      responses:
        "200":
          description: List of agencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agency"
    post:
      operationId: createAgency
      tags: [agencies]
      summary: Create agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
  /agencies/{id}:
    get:
      operationId: getAgency
      tags: [agencies]
      summary: Get agency by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
        "404":
          description: Not found
    patch:
      operationId: updateAgency
      tags: [agencies]
      summary: Update agency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
    delete:
      operationId: deleteAgency
      tags: [agencies]
      summary: Delete agency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- USERS / AUTH ---
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
  /users/me/sync:
    post:
      operationId: syncCurrentUser
      tags: [users]
      summary: Sync Clerk user to local DB after sign-in/register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncUserBody"
      responses:
        "200":
          description: Synced user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      parameters:
        - name: agencyId
          in: query
          schema:
            type: ["integer", "null"]
        - name: role
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # --- SURGEONS ---
  /surgeons:
    get:
      operationId: listSurgeons
      tags: [surgeons]
      summary: List surgeons
      parameters:
        - name: agencyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Surgeons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Surgeon"
    post:
      operationId: createSurgeon
      tags: [surgeons]
      summary: Create surgeon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSurgeonBody"
      responses:
        "201":
          description: Created surgeon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgeon"
  /surgeons/{id}:
    get:
      operationId: getSurgeon
      tags: [surgeons]
      summary: Get surgeon by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Surgeon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgeon"
        "404":
          description: Not found
    patch:
      operationId: updateSurgeon
      tags: [surgeons]
      summary: Update surgeon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSurgeonBody"
      responses:
        "200":
          description: Updated surgeon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Surgeon"
    delete:
      operationId: deleteSurgeon
      tags: [surgeons]
      summary: Delete surgeon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- PROCEDURES ---
  /surgeons/{surgeonId}/procedures:
    get:
      operationId: listProcedures
      tags: [procedures]
      summary: List procedures for a surgeon
      parameters:
        - name: surgeonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Procedures list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Procedure"
    post:
      operationId: createProcedure
      tags: [procedures]
      summary: Add procedure to surgeon
      parameters:
        - name: surgeonId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProcedureBody"
      responses:
        "201":
          description: Created procedure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Procedure"
  /surgeons/{surgeonId}/procedures/{id}:
    patch:
      operationId: updateProcedure
      tags: [procedures]
      summary: Update procedure
      parameters:
        - name: surgeonId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProcedureBody"
      responses:
        "200":
          description: Updated procedure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Procedure"
    delete:
      operationId: deleteProcedure
      tags: [procedures]
      summary: Delete procedure
      parameters:
        - name: surgeonId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- EVENTS ---
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: agencyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- EVENT SURGEONS ---
  /events/{eventId}/surgeons:
    get:
      operationId: listEventSurgeons
      tags: [events]
      summary: List surgeons assigned to an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event surgeons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventSurgeon"
    post:
      operationId: addEventSurgeon
      tags: [events]
      summary: Assign a surgeon to an event with fee/slot defaults
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventSurgeonBody"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSurgeon"
  /events/{eventId}/surgeons/{id}:
    patch:
      operationId: updateEventSurgeon
      tags: [events]
      summary: Update surgeon event settings
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventSurgeonBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSurgeon"
    delete:
      operationId: removeEventSurgeon
      tags: [events]
      summary: Remove surgeon from event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # --- APPOINTMENTS ---
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: eventId
          in: query
          schema:
            type: ["integer", "null"]
        - name: surgeonId
          in: query
          schema:
            type: ["integer", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Appointments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Created appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- CUSTOMERS ---
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: agencyId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Register/create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers/{id}/send-declaration-reminder:
    post:
      operationId: sendDeclarationReminder
      tags: [customers]
      summary: Send declaration reminder email to a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminder sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "400":
          description: Customer has no email or declaration already signed
        "404":
          description: Customer not found

  # --- REMINDER SETTINGS ---
  /reminder-settings:
    get:
      operationId: getReminderSettings
      tags: [reminderSettings]
      summary: Get declaration reminder settings for an agency
      parameters:
        - name: agencyId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminder settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderSettings"
        "404":
          description: Not found
    put:
      operationId: upsertReminderSettings
      tags: [reminderSettings]
      summary: Create or update reminder settings for an agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertReminderSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderSettings"
        "201":
          description: Created settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderSettings"

  # --- QUESTIONNAIRES ---
  /questionnaires:
    get:
      operationId: listQuestionnaires
      tags: [questionnaires]
      summary: List questionnaires
      parameters:
        - name: agencyId
          in: query
          schema:
            type: ["integer", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Questionnaires list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Questionnaire"
    post:
      operationId: createQuestionnaire
      tags: [questionnaires]
      summary: Create questionnaire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionnaireBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Questionnaire"
  /questionnaires/{id}:
    get:
      operationId: getQuestionnaire
      tags: [questionnaires]
      summary: Get questionnaire by ID (includes questions)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Questionnaire with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireWithQuestions"
        "404":
          description: Not found
    patch:
      operationId: updateQuestionnaire
      tags: [questionnaires]
      summary: Update questionnaire
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionnaireBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Questionnaire"
    delete:
      operationId: deleteQuestionnaire
      tags: [questionnaires]
      summary: Delete questionnaire
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- QUESTIONS ---
  /questionnaires/{questionnaireId}/questions:
    get:
      operationId: listQuestions
      tags: [questionnaires]
      summary: List questions for a questionnaire
      parameters:
        - name: questionnaireId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Questions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questionnaires]
      summary: Add question to questionnaire
      parameters:
        - name: questionnaireId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
  /questionnaires/{questionnaireId}/questions/{id}:
    patch:
      operationId: updateQuestion
      tags: [questionnaires]
      summary: Update question
      parameters:
        - name: questionnaireId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questionnaires]
      summary: Delete question
      parameters:
        - name: questionnaireId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # --- QUESTIONNAIRE RESPONSES ---
  /questionnaire-responses:
    get:
      operationId: listQuestionnaireResponses
      tags: [questionnaires]
      summary: List questionnaire responses
      parameters:
        - name: appointmentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: customerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: questionnaireId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Responses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionnaireResponse"
    post:
      operationId: submitQuestionnaireResponse
      tags: [questionnaires]
      summary: Submit questionnaire responses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionnaireResponseBody"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireResponse"
  /questionnaire-responses/{id}:
    get:
      operationId: getQuestionnaireResponse
      tags: [questionnaires]
      summary: Get questionnaire response by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireResponse"
        "404":
          description: Not found
    patch:
      operationId: updateQuestionnaireResponse
      tags: [questionnaires]
      summary: Update questionnaire response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionnaireResponseBody"
      responses:
        "200":
          description: Updated
          content:
